name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (lint + tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      ENVIRONMENT: test
      SECRET_KEY: test-secret-key-at-least-32-characters-long-for-testing
      DATABASE_URL: postgresql+psycopg://test:test@localhost:5432/test_db
      REDIS_URL: redis://localhost:6379/0
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Critical-only gate (syntax errors + real bugs). The full ruleset has
      # ~120 pre-existing style findings — tighten to `ruff check app tests`
      # once those are burned down.
      - name: Ruff lint (critical rules)
        run: ruff check app tests --select E9,F63,F7,F82

      # TEMPORARY advisory: the suite has ~75 pre-existing failures/errors from
      # cross-test DB contamination in the integration harness (committed rows
      # from app-engine sessions colliding with fixed-email fixtures). Make this
      # a hard gate once the harness burn-down (Phase 1) lands.
      - name: Pytest (advisory until harness burn-down)
        continue-on-error: true
        run: pytest -q --tb=short

  frontend:
    name: Frontend (typecheck + lint + tests + theme)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test:run

      - name: Theme surface audit
        run: npm run theme:check

  audit:
    name: Dependency audit (advisory)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: npm audit (high+)
        working-directory: frontend
        run: npm audit --audit-level=high || true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: pip-audit
        working-directory: backend
        run: |
          pip install pip-audit
          pip-audit -r requirements.txt || true
